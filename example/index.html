<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdedit</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button data-cmd="bold" title="太字 (Mod-b)"><b>B</b></button>
        <button data-cmd="italic" title="イタリック (Mod-i)"><i>I</i></button>
        <button data-cmd="strikethrough" title="打ち消し線 (Mod-Shift-x)"><s>S</s></button>
        <button data-cmd="code" title="コード (`)">&lt;/&gt;</button>
        <button data-cmd="link" title="リンク (Mod-k)">🔗</button>
        <button data-cmd="fontColor" title="文字色"><span style="color: #e06c75">A</span></button>
        <button data-cmd="fontSize" title="文字サイズ">A±</button>
        <button data-cmd="horizontalRule" title="区切り線">―</button>
        <button data-cmd="blockquote" title="引用">❝</button>
        <button data-cmd="bulletList" title="箇条書き">•</button>
        <button data-cmd="orderedList" title="番号付き箇条書き">1.</button>
        <button data-cmd="heading2" title="見出し2 (Mod-2)">H2</button>
        <button data-cmd="heading3" title="見出し3 (Mod-3)">H3</button>
        <button data-cmd="heading4" title="見出し4 (Mod-4)">H4</button>
        <button id="image-button" title="画像を挿入">🖼️</button>
      </div>
      <input id="image-input" type="file" accept="image/*" hidden />
      <div id="md-root"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
