<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdedit</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        background: #121212;
        margin: 0;
        height: 100%;
        font-family: "Noto Sans JP", sans-serif;
      }

      #app {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      #md-root {
        flex: 1;
        min-height: 0;
      }

      #toolbar {
        display: flex;
        gap: 4px;
        padding: 8px;
        background: #1e1e1e;
        border-bottom: 1px solid #333;
      }

      #toolbar button {
        min-width: 32px;
        height: 32px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #2a2a2a;
        color: #ddd;
        font-size: 14px;
        cursor: pointer;
      }

      #toolbar button:hover:not(:disabled) {
        background: #383838;
      }

      #toolbar button.active {
        background: #3b6ea5;
        border-color: #4a82c4;
        color: #fff;
      }

      #toolbar button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button data-cmd="bold" title="太字 (Mod-b)"><b>B</b></button>
        <button data-cmd="italic" title="イタリック (Mod-i)"><i>I</i></button>
        <button data-cmd="strikethrough" title="打ち消し線 (Mod-Shift-x)"><s>S</s></button>
        <button data-cmd="code" title="コード (`)">&lt;/&gt;</button>
        <button data-cmd="link" title="リンク（状態表示のみ・挿入は Mod-k）" disabled>🔗</button>
      </div>
      <div id="md-root"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
